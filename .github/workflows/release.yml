name: Release

# Publishes to npm on every push/merge to main — but only when the version in
# package.json is not already on the registry. Ordinary commits (docs, refactors)
# are a clean no-op; to cut a release, bump "version" in package.json and merge.
#
# Prerequisites (one-time):
#   1. The @tierone org must exist on npmjs.com.
#   2. Add an npm token as the repo secret NPM_TOKEN
#      (npmjs.com → Access Tokens → Granular, scoped to this package + publish).

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm test
      - name: Publish if version is new
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "▲ $NAME@$VERSION is already published — skipping."
          else
            echo "▲ Publishing $NAME@$VERSION ..."
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
